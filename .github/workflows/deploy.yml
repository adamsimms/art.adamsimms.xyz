name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  repository_dispatch:
    types: [cloudberry-archive-rebuild]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout art site
        uses: actions/checkout@v4

      - name: Checkout Cloudberry / pinchards repo
        uses: actions/checkout@v4
        with:
          repository: adamsimms/pinchards.is
          path: .pinchards
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Dory
        uses: actions/checkout@v4
        with:
          repository: adamsimms/dory
          path: .dory

      - name: Checkout Adrift
        uses: actions/checkout@v4
        with:
          repository: adamsimms/adrift
          path: .adrift

      - name: Checkout Waves
        uses: actions/checkout@v4
        with:
          repository: adamsimms/waves
          path: .waves

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup PHP (static archive + waves export)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: exif, json, curl
          coverage: none

      - name: Install dependencies
        run: npm ci

      - name: Inject Umami analytics
        run: npm run analytics:sync
        env:
          UMAMI_WEBSITE_ID: ${{ vars.UMAMI_WEBSITE_ID }}

      - name: Build Astro site
        run: npm run build
        env:
          PUBLIC_MAPBOX_TOKEN: ${{ vars.PUBLIC_MAPBOX_TOKEN }}

      - name: Assemble Cloudberry + siblings into dist
        run: |
          PINCHARDS_REPO_PATH="$GITHUB_WORKSPACE/.pinchards" \
          DORY_REPO_PATH="$GITHUB_WORKSPACE/.dory" \
          ADRIFT_REPO_PATH="$GITHUB_WORKSPACE/.adrift" \
          WAVES_REPO_PATH="$GITHUB_WORKSPACE/.waves" \
          npm run assemble:siblings
        env:
          MAPBOX_ACCESS_TOKEN: ${{ vars.PUBLIC_MAPBOX_TOKEN }}
          WAVES_SITE_BASE_URL: https://art.adamsimms.xyz/waves

      - name: Deploy to Cloudflare Pages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx wrangler pages deploy dist --project-name=art-adamsimms-xyz --branch="${{ github.head_ref }}"
          else
            npx wrangler pages deploy dist --project-name=art-adamsimms-xyz
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Soft-404 HTML was previously edge-cached under archive JS/CSS paths with
      # immutable max-age; purge those keys after each production deploy.
      # Token needs Zone → Cache Purge (and Zone Read, or set vars.CLOUDFLARE_ZONE_ID).
      - name: Purge Cloudberry archive edge cache
        if: github.event_name != 'pull_request'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
        run: |
          set -euo pipefail
          ZONE_ID="${CLOUDFLARE_ZONE_ID:-}"
          if [ -z "$ZONE_ID" ]; then
            ZONE_ID=$(curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4/zones?name=adamsimms.xyz" \
              | python3 -c 'import json,sys; r=json.load(sys.stdin).get("result") or []; print(r[0]["id"] if r else "")')
          fi
          if [ -z "$ZONE_ID" ]; then
            echo "::warning::Could not resolve zone id for adamsimms.xyz — set vars.CLOUDFLARE_ZONE_ID or grant Zone Read on the API token."
            exit 0
          fi
          RESP=$(curl -sS -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/purge_cache" \
            --data '{
              "files": [
                "https://art.adamsimms.xyz/cloudberry/archive",
                "https://art.adamsimms.xyz/cloudberry/archive/",
                "https://art.adamsimms.xyz/cloudberry/archive/js/viewer.js",
                "https://art.adamsimms.xyz/cloudberry/archive/js/slideshow.js",
                "https://art.adamsimms.xyz/cloudberry/archive/js/pinchard.js",
                "https://art.adamsimms.xyz/cloudberry/archive/js/gallery.js",
                "https://art.adamsimms.xyz/cloudberry/archive/css/viewer.css",
                "https://art.adamsimms.xyz/cloudberry/archive/css/gallery.css",
                "https://art.adamsimms.xyz/cloudberry/archive/css/pinchard.css"
              ]
            }')
          python3 -c 'import json,sys; d=json.loads(sys.argv[1]); print("purged", d.get("result")) if d.get("success") else sys.exit("purge failed: "+str(d))' "$RESP"

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Preview deployment')
            });

            const commentBody = `## Preview deployment ready

            Your changes have been deployed to Cloudflare Pages.

            **Preview URL:** https://art-adamsimms-xyz-${{ github.head_ref }}.pages.dev

            This preview will update automatically with each new commit.`;

            if (botComment) {
              github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }
