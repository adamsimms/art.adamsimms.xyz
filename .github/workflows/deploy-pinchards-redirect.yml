name: Deploy pinchards redirect Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'workers/pinchards-redirect/**'
      - '.github/workflows/deploy-pinchards-redirect.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy Worker
        working-directory: workers/pinchards-redirect
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 deploy
